name: ZabEsports CI/CD — Azure Deploy

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  # ============================================================
  # JOB 1: Tests del Backend
  # ============================================================
  test_backend:
    name: 🧪 Backend Unit Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependencias
        run: npm install

      - name: Ejecutar tests unitarios (Jest)
        run: npm test
        env:
          JWT_SECRET: zabesports_test_secret_ci
          NODE_ENV: test

  # ============================================================
  # JOB 2: Deploy Frontend → Azure Static Web Apps
  # ============================================================
  deploy_frontend:
    name: 🌐 Deploy Frontend → Azure Static Web Apps
    runs-on: ubuntu-latest
    needs: test_backend
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias del frontend
        run: npm install
        working-directory: ./frontend

      - name: Build del frontend (Vite)
        run: npm run build
        working-directory: ./frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Deploy a Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_POLITE_MUD_0A1C8430F }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "./frontend"
          output_location: "dist"

  # ============================================================
  # JOB 3: Deploy Backend → Azure App Service
  # ============================================================
  deploy_backend:
    name: ⚙️ Deploy Backend → Azure App Service
    runs-on: ubuntu-latest
    needs: test_backend
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependencias
        run: npm install

      - name: Build TypeScript
        run: npm run build

      - name: Create Deploy Zip
        run: zip -r deploy.zip dist package.json package-lock.json node_modules

      - name: Deploy to Azure Web App via Zip Deploy API
        run: |
          # Extraer credenciales del perfil de publicación XML
          USER_NAME=$(echo '${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}' | grep -o 'userName="[^"]*"' | head -n 1 | cut -d'"' -f2)
          USER_PWD=$(echo '${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}' | grep -o 'userPWD="[^"]*"' | head -n 1 | cut -d'"' -f2)
          PUBLISH_URL=$(echo '${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}' | grep -o 'publishUrl="[^"]*"' | head -n 1 | cut -d'"' -f2 | cut -d':' -f1)
          
          echo "Desplegando a $PUBLISH_URL usando Zip Deploy API..."
          curl -X POST \
            -u "$USER_NAME:$USER_PWD" \
            -H "Content-Type: application/zip" \
            --data-binary @deploy.zip \
            "https://$PUBLISH_URL/api/zipdeploy"

  # ============================================================
  # JOB 4: Cerrar PR (Azure Static Web Apps)
  # ============================================================
  close_pull_request_job:
    name: Close Pull Request
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_POLITE_MUD_0A1C8430F }}
          action: "close"
